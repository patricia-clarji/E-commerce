<div class="container-page">
  <section class="glass panel">
    <div class="title">Login</div>
    <div class="sub">Use your email and password to continue.</div>

    <!-- ✅ MUST have [formGroup] -->
    <form class="form" [formGroup]="form" (ngSubmit)="submit()">
      <div>
        <label class="label">Email</label>
        <input class="input" type="email" formControlName="email" autocomplete="email" />
        <div class="err" *ngIf="form.controls.email.touched && form.controls.email.invalid">
          Please enter a valid email.
        </div>
      </div>

      <div>
        <label class="label">Password</label>
        <input
          class="input"
          type="password"
          formControlName="password"
          autocomplete="current-password"
        />
        <div class="err" *ngIf="form.controls.password.touched && form.controls.password.invalid">
          Password is required (min 6 chars).
        </div>
      </div>

      <div class="err" *ngIf="error">{{ error }}</div>

      <button class="btn-primary" type="submit" [disabled]="loading()">
        {{ loading() ? 'Logging in...' : 'Login' }}
      </button>

      <div class="bottom">
        <span class="muted">No account?</span>
        <a routerLink="/register">Create one</a>
      </div>
    </form>
  </section>
</div>
