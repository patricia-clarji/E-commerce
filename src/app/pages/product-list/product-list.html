<div class="container-page">
  <div class="top glass">
    <div>
      <div class="title">Products</div>

      @if (q().trim().length) {
        <div class="sub">Results for “{{ q() }}”</div>
      } @else {
        <div class="sub">Browse by category or search in the header.</div>
      }
    </div>

    <div class="filters">
      @for (c of categories(); track c) {
        <button
          class="chip"
          type="button"
          [class.is-active]="category() === c"
          (click)="onCategoryClick(c)"
        >
          {{ c }}
        </button>
      }
    </div>
  </div>

  <div class="grid">
    @for (p of filtered(); track p.id) {
      <app-product-card [product]="p"></app-product-card>
    }
  </div>

  @if (filtered().length === 0) {
    <div class="empty glass-soft">No products found. Try another keyword.</div>
  }
</div>
