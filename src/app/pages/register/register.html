<div class="container-page">
  <section class="glass panel">
    <div class="title">Create account</div>
    <div class="sub">Join Nexora and start shopping.</div>

    <!-- ✅ MUST have [formGroup] -->
    <form class="form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="grid2">
        <div>
          <label class="label">First name</label>
          <input class="input" type="text" formControlName="firstName" />
        </div>
        <div>
          <label class="label">Last name</label>
          <input class="input" type="text" formControlName="lastName" />
        </div>
      </div>

      <div>
        <label class="label">Email</label>
        <input class="input" type="email" formControlName="email" autocomplete="email" />
      </div>

      <div class="grid2">
        <div>
          <label class="label">Username</label>
          <input class="input" type="text" formControlName="username" />
        </div>
        <div>
          <label class="label">Date of birth</label>
          <input class="input" type="date" formControlName="dateOfBirth" />
        </div>
      </div>

      <div>
        <label class="label">Password</label>
        <input
          class="input"
          type="password"
          formControlName="password"
          autocomplete="new-password"
        />
      </div>

      <div>
        <label class="label">Profile image (optional)</label>
        <input class="input" type="file" (change)="onFile($event)" />
      </div>

      <div class="err" *ngIf="error">{{ error }}</div>

      <button class="btn-primary" type="submit" [disabled]="loading()">
        {{ loading() ? 'Creating...' : 'Create account' }}
      </button>

      <div class="bottom">
        <span class="muted">Already have an account?</span>
        <a routerLink="/login">Login</a>
      </div>
    </form>
  </section>
</div>
