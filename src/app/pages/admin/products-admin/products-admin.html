<div class="container-page">
    <section class="glass panel">
        <div class="top">
            <div>
                <div class="title">Admin Products</div>
                <div class="sub">Create, edit, delete products (instant
                    updates).</div>
            </div>

            <button class="btn-primary" type="button"
                (click)="startCreate()">New product</button>
        </div>

        <form class="form glass-soft" [formGroup]="form" (ngSubmit)="save()">
            <div class="grid2">
                <div>
                    <label class="label">Name</label>
                    <input class="input" formControlName="name" />
                </div>
                <div>
                    <label class="label">Brand</label>
                    <input class="input" formControlName="brand" />
                </div>
            </div>

            <div class="grid2">
                <div>
                    <label class="label">Category</label>
                    <input class="input" formControlName="category" />
                </div>
                <div>
                    <label class="label">Images (comma separated URLs)</label>
                    <input class="input" formControlName="images" />
                </div>
            </div>

            <div class="grid2">
                <div>
                    <label class="label">Price</label>
                    <input class="input" type="number"
                        formControlName="price" />
                </div>
                <div>
                    <label class="label">Stock</label>
                    <input class="input" type="number"
                        formControlName="stock" />
                </div>
            </div>

            <div>
                <label class="label">Short description</label>
                <input class="input" formControlName="shortDescription" />
            </div>

            <div>
                <label class="label">Description</label>
                <textarea class="input" rows="4"
                    formControlName="description"></textarea>
            </div>

            <button class="btn-primary" type="submit">
                {{ editingId() ? 'Save changes' : 'Create product' }}
            </button>
        </form>

        <div class="list">
            <div class="row glass-soft" *ngFor="let p of items()">
                <div class="rleft">
                    <img class="img" [src]="p.images?.[0]" [alt]="p.name" />
                    <div>
                        <div class="name">{{ p.name }}</div>
                        <div class="muted">{{ p.brand }} • {{ p.category
                            }}</div>
                        <div class="muted">${{ p.price | number:'1.2-2' }} •
                            stock {{ p.stock }}</div>
                    </div>
                </div>

                <div class="ractions">
                    <button class="btn-ghost" type="button"
                        (click)="startEdit(p)">Edit</button>
                    <button class="btn-danger" type="button"
                        (click)="remove(p.id)">Delete</button>
                </div>
            </div>
        </div>
    </section>
</div>
