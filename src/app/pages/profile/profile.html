<div class="container-page">
  <section class="glass panel">
    <div class="title">Profile</div>
    <div class="sub">Update your account information.</div>

    <div class="me glass-soft" *ngIf="user() as u">
      <img
        class="avatar"
        [src]="u.imageUrl || 'https://api.dicebear.com/7.x/initials/svg?seed=' + (u.firstName || 'U')"
        alt="avatar"
      />
      <div>
        <div class="strong">{{ u.firstName }} {{ u.lastName }}</div>
        <div class="muted">{{ u.email }} • {{ u.role }}</div>
      </div>
    </div>

    <form class="form" [formGroup]="form" (ngSubmit)="save()">
      <div class="grid2">
        <div>
          <label class="label">First name</label>
          <input class="input" type="text" formControlName="firstName" />
        </div>
        <div>
          <label class="label">Last name</label>
          <input class="input" type="text" formControlName="lastName" />
        </div>
      </div>

      <div class="grid2">
        <div>
          <label class="label">Username</label>
          <input class="input" type="text" formControlName="username" />
        </div>
        <div>
          <label class="label">Date of birth</label>
          <input class="input" type="date" formControlName="dateOfBirth" />
        </div>
      </div>

      <div>
        <label class="label">New password (optional)</label>
        <input class="input" type="password" formControlName="password" />
      </div>

      <div>
        <label class="label">Profile image (optional)</label>
        <input class="input" type="file" (change)="onFile($event)" />
      </div>

      <div class="err" *ngIf="error">{{ error }}</div>

      <button class="btn-primary" type="submit">Save changes</button>
    </form>
  </section>
</div>
