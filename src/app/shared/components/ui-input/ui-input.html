<div class="ui">
  @if (label) {
    <label class="ui__label">{{ label }}</label>
  }

  @if (fc; as c) {
    <input
      class="ui__input"
      [class.is-error]="showError"
      [type]="type"
      [placeholder]="placeholder"
      [attr.autocomplete]="autocomplete"
      [formControl]="c"
    />
  }

  @if (hint && !showError) {
    <div class="ui__hint">{{ hint }}</div>
  }
  @if (showError) {
    <div class="ui__error">{{ firstError }}</div>
  }
</div>
