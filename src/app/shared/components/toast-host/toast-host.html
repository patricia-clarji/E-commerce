<div class="nx-toast-stack" aria-live="polite" aria-relevant="additions removals">
  @for (t of toast.toasts(); track t.id) {
  <div class="nx-toast" [ngClass]="['nx-toast--' + t.type]">
    <div>
      <div class="nx-toast__title">{{ t.title }}</div>
      @if (t.message) {
      <div class="nx-toast__msg">{{ t.message }}</div>
      }
    </div>

    <button
      class="nx-toast__close"
      type="button"
      aria-label="Close notification"
      (click)="toast.dismiss(t.id)"
    >
      ✕
    </button>
  </div>
  }
</div>
